<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedido de Desculpas</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        height: 100vh;
        background: linear-gradient(135deg, #0f001a, #1a0033);
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        text-align: center;
    }

    .container {
        width: 90%;
        max-width: 400px;
        padding: 30px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border: 2px solid #b026ff;
        box-shadow: 0 0 20px #b026ff, 0 0 40px #7a00ff;
        animation: fadeIn 1.5s ease-in-out;
    }

    h1 {
        font-size: 26px;
        margin-bottom: 20px;
        color: #d580ff;
        text-shadow: 0 0 10px #b026ff;
    }

    p {
        font-size: 16px;
        line-height: 1.6;
        margin-bottom: 25px;
        color: #f0d9ff;
    }

    .btn {
        display: inline-block;
        padding: 12px 25px;
        border-radius: 30px;
        border: none;
        background: #b026ff;
        color: white;
        font-weight: bold;
        font-size: 15px;
        cursor: pointer;
        transition: 0.3s;
        box-shadow: 0 0 15px #b026ff;
    }

    .btn:hover {
        background: #d580ff;
        box-shadow: 0 0 25px #d580ff;
        transform: scale(1.05);
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>
</head>

<body>

<div class="container">
    <h1>Me Perdoa 💜</h1>
    <p>
        Se em algum momento eu fiz algo errado ou te magoei, 
        quero que saiba que nunca foi minha intenção.
        Peço desculpas de coração. Você é importante para mim.
    </p>
    <button class="btn">Eu Sinto Muito</button>
</div>

</body>
</html>
